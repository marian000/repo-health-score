name: CI

on:
  push:
    branches: [main]
  pull_request:

# A second push to a pull request makes the first run's result irrelevant.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # The bus-factor tests build real git repositories, and the module
          # refuses to score a shallow clone.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # PHP and Composer are the first-class target, so their integration tests
      # are not optional here. The runner image happens to ship Composer today,
      # but "happens to" is how an ecosystem stops being tested without anyone
      # noticing: the suite throws rather than skips when Composer is missing on
      # CI, and this step is what keeps that from firing.
      - name: Set up PHP and Composer
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none

      # The integration tests scan a fixture repository with the real Gitleaks
      # rather than a recording of it, so the binary is fetched on a cold cache.
      # It is verified against a pinned checksum on every run, so a poisoned
      # cache entry fails closed and is re-downloaded.
      #
      # The key hashes the file that pins the version and the checksums.
      # Without it the key never changes, and because `actions/cache` skips the
      # save step on an exact key hit, a version bump would re-download the
      # binary on every run forever while the stale entry sat in the cache.
      - name: Cache the Gitleaks binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/repo-vitals
          key: repo-vitals-gitleaks-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('src/util/gitleaks-binary.ts') }}

      - run: npm ci --no-audit --no-fund

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      # A tool that scores other repositories on vulnerable dependencies cannot
      # ship vulnerable dependencies. This is the check that keeps that honest.
      - name: Audit our own dependencies
        run: npm audit --audit-level=moderate
