name: CI

on:
  push:
    branches: [main]
  pull_request:

# A second push to a pull request makes the first run's result irrelevant.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # The bus-factor tests build real git repositories, and the module
          # refuses to score a shallow clone.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --no-audit --no-fund

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      # A tool that scores other repositories on vulnerable dependencies cannot
      # ship vulnerable dependencies. This is the check that keeps that honest.
      - name: Audit our own dependencies
        run: npm audit --audit-level=moderate
