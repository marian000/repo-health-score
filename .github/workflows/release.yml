name: Release

on:
  push:
    branches: [main]

# Two runs racing to cut the same version would tag twice. Never cancel a run
# mid-release, though: a half-published version is worse than a delayed one.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Reads the Conventional Commit prefixes since the last tag and maintains a
  # release pull request: `feat` bumps the minor, `fix` the patch, and a `!` or
  # a `BREAKING CHANGE:` footer the major. Merging that PR cuts the release.
  # This is why the commit convention is load-bearing rather than cosmetic.
  prepare:
    name: Prepare the release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    outputs:
      released: ${{ steps.release.outputs.release_created }}
      tag: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}

    steps:
      # The default GITHUB_TOKEN cannot open a pull request unless the repository
      # opts in, and even then GitHub raises no workflow runs from events it
      # triggers — so a release PR opened with it carries no checks at all, and
      # the version bump would be merged unverified. RELEASE_PLEASE_TOKEN, a PAT
      # with contents and pull-requests write, fixes both.
      #
      # `secrets` cannot be read in a job-level `if`, so the guard lives here.
      # Skipping with a warning beats failing every push to main with an error
      # about permissions that says nothing about how to grant them.
      - name: Check for the release token
        id: token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -n "${RELEASE_PLEASE_TOKEN:-}" ]; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
            echo '::warning title=Release skipped::Set the RELEASE_PLEASE_TOKEN secret (a PAT with contents and pull-requests write) to enable releases.'
          fi

      # Pinned to a commit, not the `v4` tag: this job holds `contents: write`,
      # and a tag can be moved to point at anything by whoever owns the action.
      - name: Run release-please
        id: release
        if: ${{ steps.token.outputs.present == 'true' }}
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          release-type: node
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  publish:
    name: Publish to npm
    needs: prepare
    if: ${{ needs.prepare.outputs.released == 'true' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # npm provenance: the published package is signed against this workflow
      # run, so consumers can verify which commit produced the tarball.
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # `npm test` below refuses to skip the Composer integration tests on CI.
      # Without this step the release fails at the last gate before publishing —
      # correct, but for a reason that has nothing to do with the release.
      #
      # Pinned to a commit for the same reason release-please is, and more
      # urgently: this job holds NPM_TOKEN and `id-token: write`. Whoever owns a
      # mutable tag can move it, and this step runs before the token is used —
      # far enough ahead to read it and to publish a signed tarball nobody wrote.
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none

      - run: npm ci --no-audit --no-fund

      # The tag is already cut, but nothing is published yet. This is the last
      # point at which a broken release costs nothing to abandon.
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::warning title=Not published::NPM_TOKEN is not set, so the release was tagged but not published to npm."
            exit 0
          fi

          npm publish --provenance --access public

  # Consumers pin the action as `marian000/repo-health-score@v1`. That tag has
  # to follow the releases, or every consumer stays on the first v1.0.0 forever.
  major-tag:
    name: Move the major version tag
    needs: prepare
    if: ${{ needs.prepare.outputs.released == 'true' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Retag
        env:
          MAJOR: ${{ needs.prepare.outputs.major }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail

          # A moving major tag is the documented Actions convention, and the
          # only force-push in this repository. It rewrites no commit history:
          # the immutable `vX.Y.Z` tag from the release above always remains.
          git tag -fa "v$MAJOR" -m "Release v$MAJOR"
          git push --force origin "v$MAJOR"
